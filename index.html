<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Design in a Hurry</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/content.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/table.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/picker.css">
  <link rel="stylesheet" href="styles/modal.css">
  <!-- CodeMirror -->
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>

</head>
<body>

<!-- Navbar (static — logo and nav text comes from config) -->
<nav class="navbar" id="navbar"></nav>

<!-- Page shell -->
<div class="page">
  <aside class="left-sidebar" id="left-sidebar"></aside>
  <main  class="main-content"  id="main-content"></main>
  <aside class="right-sidebar" id="right-sidebar"></aside>
</div>

<!-- Load config first, then this renderer -->
<script src="data/config.js"></script>
<script src="data/pages/system-design.js"></script>
<script src="data/pages/coding-meta.js"></script>
<script src="data/pages/coding-lists.js"></script>
<script src="data/pages/stubs.js"></script>
<script src="data/seed-data.js"></script>
<script src="data/companies.js?v=2"></script>
<!-- Common -->
<script src="js/common/helpers.js"></script>
<script src="js/common/navbar.js"></script>
<script src="js/common/block-renderer.js"></script>
<script src="js/common/company-page.js"></script>
<script src="js/common/navigation.js"></script>
<!-- Tracks -->
<script src="js/tracks/system-design/main.js"></script>
<script src="js/tracks/system-design/right-sidebar.js"></script>
<script src="js/tracks/coding/main.js"></script>
<script src="js/tracks/coding/right-sidebar.js"></script>
<!-- Dispatchers -->
<script src="js/dispatchers/main-content.js"></script>
<script src="js/dispatchers/right-sidebar.js"></script>
<script>
// ── (helpers loaded from js/helpers.js) ──────────────────────

// ── (navbar + sidebar loaded from js/navbar.js) ──────────────

// ── Content block renderer ─────────────────────────────────────
// ── (renderBlock loaded from js/block-renderer.js) ───────────

// ── Dynamic company page renderer ───────────────────────────────────────────
// ── (renderCompanyPage loaded from js/company-page.js) ────────

// ── (renderMain loaded from js/main-content.js) ──────────────

// ── (renderRightSidebar loaded from js/right-sidebar.js) ─────

// ── (navigation loaded from js/navigation.js) ─────────────────

// ── Boot ──────────────────────────────────────────────────────
renderNavbar();
renderPage(getRoute());

window.addEventListener('hashchange', () => {
  renderPage(getRoute());
});
</script>

</body>
</html>
