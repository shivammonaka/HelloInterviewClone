<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Design in a Hurry</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/content.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/table.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/picker.css">
  <link rel="stylesheet" href="styles/modal.css">
  <!-- CodeMirror -->
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/autorefresh.min.js"></script>
</head>
<body>

<!-- Navbar (static — logo and nav text comes from config) -->
<nav class="navbar" id="navbar"></nav>

<!-- Page shell -->
<div class="page">
  <aside class="left-sidebar" id="left-sidebar"></aside>
  <main  class="main-content"  id="main-content"></main>
  <aside class="right-sidebar" id="right-sidebar"></aside>
</div>

<!-- Load config first, then this renderer -->
<script src="data/config.js"></script>
<script src="data/pages/system-design.js"></script>
<script src="data/pages/coding-meta.js"></script>
<script src="data/pages/coding-lists.js"></script>
<script src="data/pages/stubs.js"></script>
<script src="data/seed-data.js"></script>
<script src="data/companies.js?v=2"></script>
<script src="js/helpers.js"></script>
<script src="js/navbar.js"></script>
<script src="js/block-renderer.js"></script>
<script src="js/company-page.js"></script>
<script>
// ── (helpers loaded from js/helpers.js) ──────────────────────

// ── (navbar + sidebar loaded from js/navbar.js) ──────────────

// ── Content block renderer ─────────────────────────────────────
// ── (renderBlock loaded from js/block-renderer.js) ───────────

// ── Dynamic company page renderer ───────────────────────────────────────────
// ── (renderCompanyPage loaded from js/company-page.js) ────────

function renderMain(route) {
  const page = cfg.pages[route.pageId];
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  // ── Dynamic company page — must check BEFORE page lookup ───────
  if (route.companySlug) {
    const company = (window.COMPANY_DATA || {})[route.companySlug];
    if (company) {
      renderCompanyPage(main, company, route);
      return;
    }
    // slug given but not found — fall through to normal page
  }

  if (!page) {
    main.appendChild(el('p', 'content-p', `Page "${route.pageId}" not found in content.js.`));
    return;
  }

  // Breadcrumb
  const bc = el('div', 'breadcrumb');
  page.breadcrumb.forEach((crumb, i) => {
    if (i > 0) bc.appendChild(el('span', 'sep', '›'));
    const isLast = i === page.breadcrumb.length - 1;
    bc.appendChild(el('span', isLast ? 'current' : '', crumb));
  });
  main.appendChild(bc);

  // Banner (optional)
  if (page.banner) {
    const banner = el('div', 'banner');
    banner.appendChild(el('div', 'banner-title', page.banner.title));
    banner.appendChild(el('div', 'banner-sub',   page.banner.subtitle));
    main.appendChild(banner);
  }

  // Eyebrow
  if (page.eyebrow) main.appendChild(el('div', 'eyebrow', page.eyebrow));

  // Title
  main.appendChild(el('h1', '', page.title));

  // Lead
  if (page.lead) {
    const lead = el('p', 'lead');
    lead.innerHTML = page.lead;
    main.appendChild(lead);
  }

  // Content blocks
  page.content.forEach(block => main.appendChild(renderBlock(block, route)));

  // Next page button
  if (page.nextPage && cfg.pages[page.nextPage]) {
    const nav = el('div', 'page-nav');
    const btn = el('button', 'btn-next', `Next: ${cfg.pages[page.nextPage].title} →`);
    btn.addEventListener('click', () => navigateTo(route.trackId, page.nextPage));
    nav.appendChild(btn);
    main.appendChild(nav);
  }
}

// ── Right Sidebar ─────────────────────────────────────────────
function renderRightSidebar(route) {
  const aside = document.getElementById('right-sidebar');
  aside.innerHTML = '';

  // Reading progress — only for long-form system-design pages
  if (route.trackId === 'system-design') {
    const progCard = el('div', 'progress-card');
    progCard.innerHTML = `
      <div class="progress-label">Reading Progress</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-pct" id="progress-pct">0% read</div>
    `;
    aside.appendChild(progCard);
  }

  // TOC — built from h2/h3 blocks in the current page
  const page = cfg.pages[route.pageId];
  const headings = (page?.content || []).filter(b => b.type === 'heading2' || b.type === 'heading3');

  if (headings.length > 0) {
    aside.appendChild(el('div', 'toc-label', 'On This Page'));
    headings.forEach((h, i) => {
      const a = el('a', 'toc-item' + (i === 0 ? ' active' : ''), h.text);
      a.dataset.target = slugify(h.text);
      a.href = '#';
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.getElementById(a.dataset.target);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      aside.appendChild(a);
    });
  }
}

// ── Navigation ────────────────────────────────────────────────
function navigateTo(trackId, pageId, extra) {
  if (extra?.companySlug) {
    location.hash = `${trackId}/company/${extra.companySlug}`;
  } else {
    location.hash = `${trackId}/${pageId}`;
  }
}

function renderPage(route, opts = {}) {
  document.title = cfg.pages[route.pageId]
    ? `${cfg.pages[route.pageId].title} | ${cfg.site.name}`
    : cfg.site.name;

  renderNavbar();
  renderSidebar(route);
  renderMain(route);
  renderRightSidebar(route);
  if (opts.preserveScroll) {
    const y = typeof opts.scrollY === 'number' ? opts.scrollY : window.scrollY;
    window.scrollTo(0, y);
  } else {
    window.scrollTo(0, 0);
  }
  setupScrollListeners();
  // For long-reading pages (system design), we update progress immediately.
  // For coding pages, avoid forcing a scroll update to prevent the bar from "flashing".
  if (route.trackId === 'system-design' && typeof window.onscroll === 'function') {
    window.onscroll();
  }
}

// ── Scroll: progress + TOC active ────────────────────────────
function setupScrollListeners() {
  window.onscroll = () => {
    // Reading progress
    const doc = document.documentElement;
    const pct = Math.round((doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100) || 0;
    const fill = document.getElementById('progress-fill');
    const label = document.getElementById('progress-pct');
    if (fill)  fill.style.width = pct + '%';
    if (label) label.textContent = pct + '% read';

    // TOC active item
    const tocItems = document.querySelectorAll('.toc-item[data-target]');
    let current = 0;
    tocItems.forEach((item, i) => {
      const target = document.getElementById(item.dataset.target);
      if (target && target.getBoundingClientRect().top < 120) current = i;
    });
    tocItems.forEach((item, i) => item.classList.toggle('active', i === current));
  };
}



// ── Boot ──────────────────────────────────────────────────────
renderNavbar();
renderPage(getRoute());

window.addEventListener('hashchange', () => {
  renderPage(getRoute());
});
</script>

</body>
</html>
